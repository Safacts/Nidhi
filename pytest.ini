[pytest]
# Self-hosted test gate for Nidhi (the DBaaS control plane).
# TESTING_STRATEGY.md #13: every provisioning path is mocked; the only real DB
# touched is the throwaway Postgres on port 5442 created by the CI service / a
# local docker container.
DJANGO_SETTINGS_MODULE = nidhi_backend.test_settings
pythonpath = backend nidhi-sdk
testpaths = backend/tests
python_files = test_*.py
addopts = -ra --strict-markers -p no:cacheprovider
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
