# C:\myprojects\nidhi\git\Nidhi\docker-compose.yml

services:
  backend:
    restart: unless-stopped
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - /mnt/Storage/backups/:/host_backups
      - /usr/local/bin/mc:/usr/local/bin/mc:ro
      - /mnt/Storage/backups/minio:/backups_media/minio
      - /mnt/Storage/backups/db:/backups_media/db
      - ./backend:/app
    ports:
      - "8001:8000" # Keep Nidhi on port 8001
    env_file:
      - ./backend/.env
    environment:
      - MINIO_ENDPOINT=nidhi-minio-1:9000
    depends_on:
      - db
      - main_db
      - redis

  celery:
    restart: unless-stopped
    build: ./backend
    command: celery -A nidhi_backend worker -l info
    volumes:
      - ./backend:/app
      - nidhi_backups:/backups
      - /usr/local/bin/mc:/usr/local/bin/mc:ro
      - /mnt/Storage/backups/minio:/backups_media/minio
      - /mnt/Storage/backups/db:/backups_media/db
    env_file:
      - ./backend/.env
    environment:
      - DEV_MINIO_ENDPOINT=nidhi-minio-1:9000
    depends_on:
      - db
      - redis

  celery-beat:
    restart: unless-stopped
    build: ./backend
    command: celery -A nidhi_backend beat -l info
    volumes:
      - ./backend:/app
      - nidhi_backups:/backups
      - /usr/local/bin/mc:/usr/local/bin/mc:ro
      - /mnt/Storage/backups/minio:/backups_media/minio
      - /mnt/Storage/backups/db:/backups_media/db
    env_file:
      - ./backend/.env
    environment:
      - DEV_MINIO_ENDPOINT=nidhi-minio-1:9000
    depends_on:
      - db
      - redis

  redis:
    restart: unless-stopped
    image: redis:alpine

  frontend:
    restart: unless-stopped
    build: ./frontend
    ports:
      - "3000:3000"

  # --- S3 Object Storage ---
  minio:
    restart: unless-stopped
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin_nidhi_minio
      MINIO_ROOT_PASSWORD: secure_nidhi_minio_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # This is Nidhi's OWN database for storing requests
  db:
    restart: unless-stopped
    image: postgres:13
    volumes:
      - nidhi_postgres_data:/var/lib/postgresql/data/
      - ./db-primary-init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=nidhi_db
      - POSTGRES_USER=nidhi_user
      - POSTGRES_PASSWORD=a_secure_password_for_nidhi
    ports:
      - "5433:5432" # Use a unique host port for Nidhi's internal DB
    command:
      - "postgres"
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "wal_keep_size=512MB"
      - "-c"
      - "listen_addresses=*"

  # --- ADD THIS ENTIRE SERVICE ---
  # This is the MAIN PostgreSQL server that Nidhi will manage
  main_db:
    restart: unless-stopped
    image: postgres:16
    volumes:
      - main_postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=AADISHESHU1.
      - PGTZ=Asia/Kolkata
    ports:
      - "5435:5432" # Expose the main DB on port 5435 for external access
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "max_connections=200"

volumes:
  nidhi_postgres_data:
  main_postgres_data:
  minio_data: # Add the new volume
  nidhi_backups: