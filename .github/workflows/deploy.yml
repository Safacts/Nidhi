name: Build and Push Nidhi

on:
  push:
    branches:
      - 'main' # CHECK YOUR BRANCH NAME (might be 'master' or 'krishna')
      - 'development-v1' # Nidhi active dev branch — also trigger build/push here

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compute short SHA
        run: echo "SHORT_SHA=$(echo ${GITHUB_SHA} | cut -c1-7)" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: x-access-token
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Nidhi Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/vitharn-hq/nidhi-backend:latest
            ghcr.io/vitharn-hq/nidhi-backend:sha-${{ env.SHORT_SHA }}

      - name: Build Nidhi Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/vitharn-hq/nidhi-frontend:latest
            ghcr.io/vitharn-hq/nidhi-frontend:sha-${{ env.SHORT_SHA }}